<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif}
#hdr{background:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.12);z-index:1000;position:relative;height:58px}
.hl{display:flex;align-items:center;gap:10px}
#hdr img{height:34px}
#hdr h1{font-size:14px;font-weight:700;color:#222}
#hdr h1 span{color:#e84c1e}
#badge{font-size:12px;background:#fff5f2;border:1px solid #f5c4b3;border-radius:20px;padding:4px 12px;color:#e84c1e;font-weight:700}
#map{height:calc(100vh - 58px);width:100%}
#sc{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:2000;background:#fff;border-radius:30px;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;padding:4px;gap:3px}
.sb{border:none;background:transparent;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:600;cursor:pointer;color:#555;transition:all .15s;white-space:nowrap}
.sb:hover{background:#f0f0f0;color:#222}
.sb.on{background:#e84c1e;color:#fff}
#sbl{position:fixed;top:68px;left:10px;z-index:2000;background:#fff;border:1px solid #ddd;border-radius:7px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.1);color:#333}
#sbl:hover{background:#f5f5f5}
#sidebar{position:fixed;top:58px;left:0;z-index:1999;background:#fff;width:280px;height:calc(100vh - 58px);overflow-y:auto;box-shadow:3px 0 10px rgba(0,0,0,.1);transform:translateX(-280px);transition:transform .25s}
#sidebar.open{transform:translateX(0)}
#sbh{padding:11px 14px;border-bottom:2px solid #e84c1e;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
#sbh button{background:none;border:none;font-size:15px;cursor:pointer;color:#aaa}
#srch{padding:9px 11px;background:#fafafa;border-bottom:1px solid #eee;position:sticky;top:41px;z-index:1}
#srch input{width:100%;border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:12px;outline:none}
#srch input:focus{border-color:#e84c1e}
#lcnt{font-size:11px;color:#aaa;padding:5px 14px 2px}
.li{padding:9px 14px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.li:hover{background:#fff5f2;border-left:3px solid #e84c1e;padding-left:11px}
.lc{font-size:12px;font-weight:700;color:#e84c1e}
.la{font-size:11px;color:#666;margin-top:1px;line-height:1.3}
.ld{font-size:11px;color:#bbb;margin-top:1px}
.pm{min-width:220px;font-family:Arial,sans-serif}
.ph{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.pc{background:#e84c1e;color:#fff;font-size:12px;font-weight:700;padding:3px 8px;border-radius:4px}
.pd{font-size:11px;color:#e84c1e;background:#fff5f2;border:1px solid #f5c4b3;padding:2px 7px;border-radius:3px}
.pa{font-size:12px;color:#444;border-top:1px solid #eee;padding-top:6px;line-height:1.4}
.pf-wrap{width:100%;margin-top:7px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pf{width:100%;height:130px;border-radius:5px;object-fit:cover;display:block;pointer-events:none}
.pf-wrap:active .pf{opacity:.8}
.pf-hint{text-align:center;font-size:10px;color:#bbb;margin-top:3px;letter-spacing:.03em}
.pn{width:100%;height:60px;background:#f5f5f5;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;margin-top:7px;border:1px dashed #ddd}
.mk{background:#fff;border:2.5px solid #e84c1e;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(0,0,0,.25);overflow:hidden}
.mk img{width:26px;height:26px;object-fit:contain}
#lb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.93);align-items:center;justify-content:center;flex-direction:column;gap:12px;-webkit-tap-highlight-color:transparent}
#lb.open{display:flex}
#lb-img{max-width:94vw;max-height:80vh;border-radius:8px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.6);pointer-events:none}
#lb-caption{color:#fff;font-size:13px;font-weight:600;letter-spacing:.03em;opacity:.9;text-align:center;padding:0 16px}
#lb-close{position:fixed;top:16px;right:18px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
#lb-hint{color:rgba(255,255,255,.35);font-size:11px}
.leaflet-popup-content-wrapper{border-radius:10px!important;box-shadow:0 4px 16px rgba(0,0,0,.15)!important}
.leaflet-popup-content{margin:14px 16px!important}
</style>

var TILES = {
  voyager:   "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
  satellite: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  dark:      "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  light:     "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
};

var map = L.map("map").setView([40.845, 14.240], 12);
var activeLayer = L.tileLayer(TILES.voyager, {maxZoom:19}).addTo(map);
var MK = [];

function openLb(src, caption) {
  document.getElementById("lb-img").src = src;
  document.getElementById("lb-caption").textContent = caption;
  document.getElementById("lb").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLb() {
  document.getElementById("lb").classList.remove("open");
  document.getElementById("lb-img").src = "";
  document.body.style.overflow = "";
}
document.getElementById("lb").addEventListener("click", function(e) {
  if (e.target === this) closeLb();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeLb();
});

document.addEventListener("click", function(e) {
  var w = e.target.closest(".pf-wrap");
  if (w) { openLb(w.dataset.src, w.dataset.cap); }
});
document.addEventListener("touchend", function(e) {
  var w = e.target.closest(".pf-wrap");
  if (w) { e.preventDefault(); openLb(w.dataset.src, w.dataset.cap); }
}, {passive: false});

function setTile(key) {
  map.removeLayer(activeLayer);
  activeLayer = L.tileLayer(TILES[key], {maxZoom:19}).addTo(map);
  document.querySelectorAll(".sb").forEach(function(b){ b.classList.remove("on"); });
  document.getElementById("btn-" + key).classList.add("on");
}

function ico() {
  return L.divIcon({
    className: "",
    html: '<div class="mk"><img src="' + LOGO + '"></div>',
    iconSize:[36,36], iconAnchor:[18,36], popupAnchor:[0,-38]
  });
}

function ph(p) {
  var n   = "n" + p.cimasa;
  var src = BF + p.cimasa + ".jpg";
  var cap = p.cimasa + " — " + p.indirizzo;
  return '<div class="pm"><div class="ph"><div class="pc">' + p.cimasa + '</div><div class="pd">' + p.dimensione + '</div></div>'
    + '<div class="pa">' + p.indirizzo + '</div>'
    + '<div class="pf-wrap" data-src="' + src + '" data-cap="' + cap + '">'
    + '<img class="pf" src="' + src + '" onerror="this.closest(\'.pf-wrap\').style.display=\'none\';document.getElementById(\'' + n + '\').style.display=\'flex\'">'
    + '<div class="pf-hint">Tocca per ingrandire</div>'
    + '</div>'
    + '<div id="' + n + '" class="pn" style="display:none">Foto non disponibile</div></div>';
}

function rl(f) {
  f = (f || "").toLowerCase();
  var l = IMP.filter(function(i) {
    return i.cimasa.toLowerCase().indexOf(f) >= 0 || i.indirizzo.toLowerCase().indexOf(f) >= 0;
  });
  document.getElementById("lcnt").textContent = l.length + " impianti";
  document.getElementById("li").innerHTML = l.map(function(i) {
    return '<div class="li" onclick="fi(\'' + i.cimasa + '\')">'
      + '<div class="lc">' + i.cimasa + '</div>'
      + '<div class="la">' + i.indirizzo + '</div>'
      + '<div class="ld">' + i.dimensione + '</div></div>';
  }).join("");
}

function fi(c) {
  var found = null;
  for (var i = 0; i < MK.length; i++) { if (MK[i].d.cimasa === c) { found = MK[i]; break; } }
  if (found) {
    map.flyTo([found.d.lat, found.d.lng], 17, {duration:1});
    setTimeout(function(){ found.m.openPopup(); }, 900);
    if (document.getElementById("sidebar").classList.contains("open")) tgSb();
  }
}

function fl(v) { rl(v); }
function tgSb() { document.getElementById("sidebar").classList.toggle("open"); }

IMP.forEach(function(p) {
  var m = L.marker([p.lat, p.lng], {icon: ico()}).bindPopup(ph(p), {maxWidth:260});
  m.addTo(map);
  MK.push({m:m, d:p});
});

document.getElementById("cnt").textContent = IMP.length;
rl();
</script>
