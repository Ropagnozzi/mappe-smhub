<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Arial,sans-serif;background:#f0f0f0}
  #header{background:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.10);position:relative;z-index:1000;height:60px}
  .header-left{display:flex;align-items:center;gap:12px}
  #header img{height:36px}
  #header h1{font-size:15px;font-weight:700;color:#222}
  #header h1 span{color:#e84c1e}
  #counter{font-size:12px;background:#fff5f2;border:1px solid #f5c4b3;border-radius:20px;padding:5px 14px;color:#e84c1e;font-weight:700}
  #map{height:calc(100vh - 60px);width:100%}
  .popup-box{min-width:240px;font-family:Arial,sans-serif;padding:2px}
  .popup-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .popup-cimasa{background:#e84c1e;color:#fff;font-size:13px;font-weight:700;padding:4px 10px;border-radius:4px;letter-spacing:.06em;flex-shrink:0}
  .popup-dim{font-size:12px;color:#e84c1e;background:#fff5f2;border:1px solid #f5c4b3;padding:3px 8px;border-radius:3px;font-weight:600}
  .popup-addr{font-size:12px;color:#444;line-height:1.5;border-top:1px solid #f0f0f0;padding-top:8px}
  .popup-foto{width:100%;height:140px;border-radius:6px;margin-top:8px;object-fit:cover;display:block}
  .popup-nofoto{width:100%;height:80px;background:#f5f5f5;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;margin-top:8px;border:1px dashed #ddd;gap:6px}
  .smhub-marker{background:#fff;border:2.5px solid #e84c1e;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.25);overflow:hidden}
  .smhub-marker img{width:28px;height:28px;object-fit:contain}
  #sidebar{position:fixed;top:60px;left:0;z-index:999;background:#fff;width:290px;height:calc(100vh - 60px);overflow-y:auto;box-shadow:3px 0 12px rgba(0,0,0,.10);transform:translateX(-290px);transition:transform .28s ease}
  #sidebar.open{transform:translateX(0)}
  #sidebar-header{padding:12px 16px;background:#fff;border-bottom:2px solid #e84c1e;font-size:13px;font-weight:700;color:#222;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1}
  #search-box{padding:10px 12px;background:#fafafa;border-bottom:1px solid #eee;position:sticky;top:41px;z-index:1}
  #search-input{width:100%;border:1px solid #e0e0e0;border-radius:20px;padding:7px 14px;font-size:12px;outline:none;background:#fff}
  #search-input:focus{border-color:#e84c1e}
  #list-count{font-size:11px;color:#aaa;padding:6px 16px 2px}
  .imp-item{padding:10px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .12s}
  .imp-item:hover{background:#fff5f2;border-left:3px solid #e84c1e;padding-left:13px}
  .imp-cimasa{font-size:12px;font-weight:700;color:#e84c1e}
  .imp-addr{font-size:11px;color:#666;margin-top:2px;line-height:1.35}
  .imp-dim{font-size:11px;color:#bbb;margin-top:2px}
  #btn-list{position:fixed;top:72px;left:12px;z-index:1000;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.10);color:#333;display:flex;align-items:center;gap:6px}
  #btn-list:hover{background:#f5f5f5}
  #btn-close-sidebar{background:none;border:none;font-size:16px;cursor:pointer;color:#aaa}
  #btn-close-sidebar:hover{color:#e84c1e}
  .leaflet-popup-content-wrapper{border-radius:10px!important;box-shadow:0 4px 16px rgba(0,0,0,.15)!important}
  .leaflet-popup-content{margin:14px 16px!important}
</style>

let markers = [], map;

function popupHtml(imp) {
  const nid = "nd-" + imp.cimasa;
  const fid = "fi-" + imp.cimasa;
  return '<div class="popup-box">'
    + '<div class="popup-header">'
    + '<div class="popup-cimasa">' + imp.cimasa + '</div>'
    + '<div class="popup-dim">&#128210; ' + imp.dimensione + '</div>'
    + '</div>'
    + '<div class="popup-addr">' + imp.indirizzo + '</div>'
    + '<img id="' + fid + '" class="popup-foto" src="' + BASE_FOTO + imp.cimasa + '.jpg"'
    + ' onerror="this.style.display='none';document.getElementById('' + nid + '').style.display='flex'">'
    + '<div id="' + nid + '" class="popup-nofoto" style="display:none">&#128247; Foto non disponibile</div>'
    + '</div>';
}

function creaIcona() {
  return L.divIcon({
    className: "",
    html: '<div class="smhub-marker"><img src="' + LOGO + '"></div>',
    iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-40]
  });
}

function renderLista(filtro) {
  const f = (filtro||"").toLowerCase();
  const lista = IMPIANTI.filter(i =>
    i.cimasa.toLowerCase().includes(f) || i.indirizzo.toLowerCase().includes(f));
  document.getElementById("list-count").textContent = lista.length + " impianti";
  document.getElementById("list-items").innerHTML = lista.map(function(imp) {
    return '<div class="imp-item" onclick="focusImpianto('' + imp.cimasa + '')">'
      + '<div class="imp-cimasa">' + imp.cimasa + '</div>'
      + '<div class="imp-addr">'  + imp.indirizzo + '</div>'
      + '<div class="imp-dim">'   + imp.dimensione + '</div>'
      + '</div>';
  }).join("");
}

function focusImpianto(cimasa) {
  const found = markers.find(function(m){return m.data.cimasa===cimasa;});
  if(found){
    map.flyTo([found.data.lat,found.data.lng],17,{duration:1});
    setTimeout(function(){found.marker.openPopup();},900);
    if(document.getElementById("sidebar").classList.contains("open")) toggleSidebar();
  }
}

function filterList(val){renderLista(val);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}

map = L.map("map").setView([40.845,14.240],12);
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom:19
}).addTo(map);

IMPIANTI.forEach(function(imp){
  const m = L.marker([imp.lat,imp.lng],{icon:creaIcona()})
    .bindPopup(popupHtml(imp),{maxWidth:270});
  m.addTo(map);
  markers.push({marker:m,data:imp});
});

document.getElementById("cnt").textContent = IMPIANTI.length;
